<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <meta property="og:title" content="Meowdoku! Solver"/>
    <meta property="og:description" content="Быстро, безопасно и совершенно бесплатно решайте уровни из Meowdoku!"/>
    <meta property="og:image" content="https://meowsolv.netlify.app/assets/smile_cat.png"/>

    <title>Meowdoku Solver</title>
    <meta name="description" content="Быстро, безопасно и совершенно бесплатно решайте уровни из Meowdoku!">

    <base href="/solver/"/>
    <link rel="preload" id="webassembly"/>
    <link rel="stylesheet" href="css/app.css"/>
    <link rel="icon" type="image/png" href="favicon.png"/>
    <link href="Meowdoku.Solver.styles.css" rel="stylesheet"/>
    <script type="importmap"></script>
</head>

<body>
<div class="app-content-wrapper">
    <div class="app-content">
        <div id="app">
            <div class="loading-progress">
                <span style="--h:0;--d:0.0s"></span>
                <span style="--h:15;--d:0.2s"></span>
                <span style="--h:30;--d:0.4s"></span>
                <span style="--h:60;--d:0.8s;"></span>
                <span style="--h:75;--d:1.0s">
                <p class="loading-progress-text"></p>
            </span>
                <span style="--h:90;--d:1.2s"></span>
                <span style="--h:120;--d:1.6s"></span>
                <span style="--h:135;--d:1.8s"></span>
                <span style="--h:150;--d:2.0s"></span>
            </div>
        </div>
    </div>
</div>
<script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
